output_dir: inbox
timezone: Australia/Sydney
max_items_per_source: 12
max_digest_items: 30

ai:
  enabled: true
  provider: deepseek
  base_url: https://api.deepseek.com
  model: deepseek-v4-flash
  max_items: 15
  max_summary_chars_per_item: 1200
  language: zh-CN

search:
  hf_space_queries:
    - agent leaderboard
    - multi-agent benchmark
    - web agent
    - agent challenge
    - coding agent benchmark
    - computer use agent
    - tool use agent
    - SWE-bench agent
    - GAIA benchmark
    - WebArena agent

ranking:
