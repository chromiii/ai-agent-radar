name: AI Agent Radar

on:
  workflow_dispatch:
  schedule:
    # 00:00 Australia/Sydney during AEST (UTC+10).
    # Adjust this when daylight saving changes if you care about exact wall-clock time.
    - cron: "0 14 * * *"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

concurrency:
  group: ai-agent-radar-${{ github.ref }}
  cancel-in-progress: true

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run radar
        run: python radar.py

      - name: Commit digest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add inbox/*.md state.json
          if git diff --cached --quiet; then
            echo "No digest changes to commit."
            exit 0
          fi
          git commit -m "Add daily AI agent radar digest"
          git pull --rebase --autostash origin main
          git push origin main

      - name: Send digest email
        env:
          QQ_MAIL_USERNAME: ${{ secrets.QQ_MAIL_USERNAME }}
          QQ_MAIL_PASSWORD: ${{ secrets.QQ_MAIL_PASSWORD }}
          QQ_MAIL_TO: ${{ secrets.QQ_MAIL_TO }}
        run: |
          report_path="$(find inbox -maxdepth 1 -name '*.md' -type f 2>/dev/null | sort | tail -n 1 || true)"
          if [ -z "$report_path" ]; then
            echo "No daily report found; skipping email."
            exit 0
          fi
          report_day="$(basename "$report_path" .md)"
          python send_email.py "$report_path" "AI Agent Radar - $report_day"
